name: CI Test

on:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/ci-test.yml'

jobs:
  validate:
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTEST_SIZE=128

      - name: Build
        run: cmake --build build

      - name: Run validation tests
        run: cmake --build build --target test
